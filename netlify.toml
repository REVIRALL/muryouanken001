[build]
  publish = "lp"
  command = "node scripts/check_placeholders.mjs && node scripts/check_meta_policy.mjs && node scripts/check_evidence.mjs"
  functions = "netlify/functions"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[[redirects]]
  from = "/privacy"
  to = "/privacy/index.html"
  status = 200

# CAPI エンドポイント
[[redirects]]
  from = "/api/capi"
  to = "/.netlify/functions/capi"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
