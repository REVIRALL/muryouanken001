<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LINE で友だち追加｜コミュニティ運営者の新しい選択肢</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="./assets/styles.css">
<style>
  .liff-wrap { max-width: 560px; margin: 0 auto; padding: 32px 20px; text-align: center; }
  .liff-wrap h1 { font-size: clamp(20px, 4.4vw, 26px); margin: 16px 0 10px; color: var(--color-ink); }
  .liff-wrap p { font-size: clamp(14px, 3.2vw, 16px); margin-bottom: 14px; }
  .liff-wrap .note { font-size: 12.5px; color: var(--color-muted); }
  .liff-wrap .loading { display: inline-block; margin: 24px auto; color: var(--color-muted); }
</style>
</head>
<body>
<main class="liff-wrap">
  <img src="./assets/operator_placeholder.svg" alt="運営者" width="96" height="96" style="border-radius:50%;margin:0 auto 10px;">
  <h1>まもなく LINE を開きます…</h1>
  <p>
    「無料案件キャッシュバック 代理店プログラム」の LINE 公式アカウントへ移動します。<br>
    友だち追加後、15 分面談の日程候補が自動で届きます。
  </p>
  <p class="note">
    ※ このページは計測のための中継ページです。<br>
    ※ 自動で開かない場合は、<a id="fallback-link" href="#">こちらをタップ</a>してください。
  </p>
  <div class="loading">遷移中…</div>
</main>

<script>
/**
 * LIFF 中間ページ
 * 役割:
 *   1. LP からの fbclid / utm を Cookie / sessionStorage に引き継ぐ
 *   2. CAPI 経由で Lead イベントを送信（Netlify Functions 経由）
 *   3. LINE 友だち追加 URL にリダイレクト
 *
 * 稼働中の Meta 学習を壊さないため、本ページでは fbq('track','Lead') は発火しない。
 * CAPI (server → Meta) のみで Lead を計上する。
 * 将来 Stage 2 で LP 側の fbq Lead を停止してからが本番運用。
 */
(async function () {
  'use strict';

  var params = new URLSearchParams(location.search);

  // ---- fbclid の引き継ぎ（LP から到達時に既に Cookie/sessionStorage に書かれている想定） ----
  var fbclid = params.get('fbclid');
  if (fbclid) {
    var fbc = 'fb.1.' + Date.now() + '.' + fbclid;
    document.cookie = '_fbc=' + fbc + '; Max-Age=7776000; Path=/; SameSite=Lax; Secure';
    try { sessionStorage.setItem('_fbc', fbc); } catch (_) {}
  }

  // ---- 計測メタデータ ----
  function getCookie(name) {
    var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]+)'));
    return m ? decodeURIComponent(m[1]) : '';
  }
  var fbc = getCookie('_fbc');
  var fbp = getCookie('_fbp');
  try {
    if (!fbc) fbc = sessionStorage.getItem('_fbc') || '';
  } catch (_) {}

  var eventId = 'lead_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);

  // ---- CAPI エンドポイントに送信（失敗してもリダイレクトは続行） ----
  try {
    await fetch('/.netlify/functions/capi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        event_id: eventId,
        event_name: 'Lead',
        event_time: Math.floor(Date.now() / 1000),
        event_source_url: location.href,
        fbc: fbc || null,
        fbp: fbp || null,
        utm_code: (function () { try { return sessionStorage.getItem('utm_code') || ''; } catch (_) { return ''; } })(),
        client_user_agent: navigator.userAgent
      }),
      keepalive: true
    });
  } catch (_) { /* noop */ }

  // ---- 遷移先 LINE URL を決定 ----
  var nextUrl = 'https://s.lmes.jp/landing-qr/2009804039-gtVVGAua?uLand=tas1Lx'; // fallback
  try {
    var res = await fetch('./assets/url-map.json', { cache: 'no-store' });
    if (res.ok) {
      var map = await res.json();
      var utmCode = '';
      try { utmCode = sessionStorage.getItem('utm_code') || ''; } catch (_) {}
      nextUrl = map[utmCode] || map[''] || nextUrl;
    }
  } catch (_) { /* noop */ }

  // fallback link も差し替え
  var fb = document.getElementById('fallback-link');
  if (fb) fb.setAttribute('href', nextUrl);

  // 500ms 余裕を持って遷移（計測送信完了を待つ）
  setTimeout(function () { window.location.replace(nextUrl); }, 500);
})();
</script>
</body>
</html>
